<!DOCTYPE html>
<html>
<head>
    <title>SAHI Portal - Initial Setup</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 90vh; }
        .container { max-width: 420px; width: 100%; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .company-header { background: #87CEEB; padding: 12px 20px; margin: -30px -30px 20px -30px; border-radius: 8px 8px 0 0; text-align: center; }
        .company-header .l1 { font-weight: bold; font-size: 15px; color: #000; }
        .company-header .l2 { font-size: 11px; color: #000; }
        h2 { color: #333; margin-top: 0; }
        p.sub { color: #666; font-size: 13px; margin-top: -8px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #87CEEB; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .error-box { background: #fdecea; color: #b71c1c; padding: 10px; border-radius: 4px; margin-top: 12px; font-size: 13px; display: none; }
        .hint { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="company-header">
            <div class="l1">SAHI SHANGHAI COMPANY LTD.</div>
            <div class="l2">飒鹤（上海）贸易有限公司</div>
        </div>
        <h2>Create Admin Account</h2>
        <p class="sub">This is a one-time setup. This account becomes the first Admin and can create other team logins afterward.</p>
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" autocomplete="username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" autocomplete="new-password">
            <div class="hint">At least 8 characters.</div>
        </div>
        <button onclick="doSetup()">Create Admin Account</button>
        <div id="errorBox" class="error-box"></div>
    </div>

    <script>
        fetch('/api/setup-status').then(r => r.json()).then(d => {
            if (!d.needsSetup) window.location.href = '/login.html';
        });

        async function doSetup() {
            const errorBox = document.getElementById('errorBox');
            errorBox.style.display = 'none';
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                errorBox.textContent = 'Email and password are required.';
                errorBox.style.display = 'block';
                return;
            }
            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorBox.textContent = data.error || 'Setup failed.';
                    errorBox.style.display = 'block';
                    return;
                }
                window.location.href = '/login.html';
            } catch (e) {
                errorBox.textContent = 'Connection error.';
                errorBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
